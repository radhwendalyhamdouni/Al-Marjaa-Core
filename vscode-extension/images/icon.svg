<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a5fb4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3584e4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e8e8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="8" y="8" width="112" height="112" rx="16" ry="16" fill="url(#bgGrad)"/>

  <!-- Decorative elements -->
  <circle cx="32" cy="32" r="4" fill="rgba(255,255,255,0.2)"/>
  <circle cx="96" cy="96" r="6" fill="rgba(255,255,255,0.15)"/>
  <circle cx="100" cy="28" r="3" fill="rgba(255,255,255,0.1)"/>

  <!-- Arabic letter "م" (Meem) stylized -->
  <g transform="translate(24, 28)">
    <path d="M 10 60
             Q 10 15 40 15
             Q 70 15 70 40
             Q 70 65 50 65
             Q 35 65 35 50
             L 35 35
             Q 35 25 45 25
             Q 55 25 55 40
             L 55 65
             Q 55 75 40 75
             Q 20 75 20 55
             L 20 45"
          fill="url(#textGrad)"
          stroke="none"/>
  </g>

  <!-- Code brackets decoration -->
  <text x="20" y="110" font-family="monospace" font-size="20" fill="rgba(255,255,255,0.6)">{</text>
  <text x="92" y="110" font-family="monospace" font-size="20" fill="rgba(255,255,255,0.6)">}</text>
</svg>
